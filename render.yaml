services:
  - type: web
    name: heew-attendance-tracker
    runtime: node
    buildCommand: npm install && npm run build && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@heew.com
      - key: ADMIN_PASSWORD
        sync: false
